version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    container_name: auth-service
    expose:
      - "3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/auth-db
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - app-network
    restart: on-failure

  order-service:
    build: ./order-service
    expose:
      - "3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/order-db
      - RABBITMQ_URL=amqp://rabbitmq
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - app-network
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    expose:
      - "3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/notification-db
      - RABBITMQ_URL=amqp://rabbitmq
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - app-network
    restart: on-failure

  gateway:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - order-service
      - notification-service
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
