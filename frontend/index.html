<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickDeliver — Food Delivery System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    nav { background: #e74c3c; color: white; padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { font-size: 20px; font-weight: 700; }
    nav span { font-size: 14px; opacity: 0.9; }
    #logout-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #logout-btn:hover { background: rgba(255,255,255,0.3); }
    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; background: white; color: #666; border: 1px solid #ddd; }
    .tab.active { background: #e74c3c; color: white; border-color: #e74c3c; }
    .tab:hover:not(.active) { background: #f0f0f0; }
    .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #222; }
    label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 5px; margin-top: 14px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #e74c3c; }
    button.btn { margin-top: 18px; padding: 12px 28px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    button.btn:hover { background: #c0392b; }
    button.btn-secondary { background: #333; }
    button.btn-secondary:hover { background: #111; }
    button.btn-small { margin-top: 0; padding: 6px 16px; width: auto; font-size: 13px; border-radius: 6px; }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .order-card { border: 1px solid #eee; border-radius: 10px; padding: 18px; margin-bottom: 14px; }
    .order-card:hover { border-color: #e74c3c; }
    .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .order-id { font-size: 12px; color: #888; font-family: monospace; }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #d1ecf1; color: #0c5460; }
    .status-preparing { background: #cce5ff; color: #004085; }
    .status-out_for_delivery { background: #d4edda; color: #155724; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    .items-list { font-size: 13px; color: #555; margin: 8px 0; }
    .total { font-weight: 700; color: #e74c3c; font-size: 16px; }
    .notif-card { border-left: 4px solid #e74c3c; background: #fff9f9; border-radius: 0 10px 10px 0; padding: 14px 18px; margin-bottom: 12px; }
    .notif-type { font-size: 11px; font-weight: 700; color: #e74c3c; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .notif-msg { font-size: 14px; color: #333; margin-bottom: 4px; }
    .notif-time { font-size: 12px; color: #aaa; }
    #auth-section { max-width: 440px; margin: 60px auto; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .item-row { display: grid; grid-template-columns: 1fr 80px 80px 36px; gap: 8px; align-items: end; margin-bottom: 8px; }
    .item-row label { margin-top: 0; }
    .remove-btn { background: #f8d7da; color: #721c24; border: none; border-radius: 6px; padding: 10px; cursor: pointer; font-size: 16px; height: 40px; }
    .remove-btn:hover { background: #f5c6cb; }
    .add-item-btn { background: none; border: 1px dashed #e74c3c; color: #e74c3c; border-radius: 8px; padding: 8px; width: 100%; cursor: pointer; font-size: 13px; margin: 8px 0 0; }
    .add-item-btn:hover { background: #fff5f5; }
    .section-title { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .hidden { display: none; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .meta { font-size: 13px; color: #888; }
  </style>
</head>
<body>

<nav>
  <h1>🍔 QuickDeliver</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="nav-user"></span>
    <button id="logout-btn" class="hidden" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- AUTH SECTION -->
<div id="auth-section">
  <div class="card" id="login-card">
    <h2>Login</h2>
    <div id="login-alert"></div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@example.com" />
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" />
    <button class="btn" onclick="login()">Login</button>
    <p style="text-align:center;margin-top:16px;font-size:14px;color:#666;">
      No account? <a href="#" onclick="showRegister()" style="color:#e74c3c;">Register</a>
    </p>
  </div>

  <div class="card hidden" id="register-card">
    <h2>Create Account</h2>
    <div id="register-alert"></div>
    <label>Full Name</label>
    <input type="text" id="reg-name" placeholder="John Doe" />
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="you@example.com" />
    <label>Password</label>
    <input type="password" id="reg-password" placeholder="••••••••" />
    <label>Role</label>
    <select id="reg-role">
      <option value="customer">Customer</option>
      <option value="admin">Admin</option>
    </select>
    <button class="btn" onclick="register()">Register</button>
    <p style="text-align:center;margin-top:16px;font-size:14px;color:#666;">
      Have account? <a href="#" onclick="showLogin()" style="color:#e74c3c;">Login</a>
    </p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-section" class="hidden">
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('orders')">My Orders</button>
      <button class="tab" onclick="showTab('place')">Place Order</button>
      <button class="tab" onclick="showTab('notifications')">Notifications</button>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders">
      <div class="flex-between" style="margin-bottom:16px;">
        <h2 style="font-size:18px;font-weight:600;">Orders</h2>
        <button class="btn btn-small" onclick="loadOrders()">Refresh</button>
      </div>
      <div id="orders-alert"></div>
      <div id="orders-list"><p style="color:#888;text-align:center;padding:40px 0;">Loading orders...</p></div>
    </div>

    <!-- PLACE ORDER TAB -->
    <div id="tab-place" class="hidden">
      <div class="card">
        <h2>Place a New Order</h2>
        <div id="place-alert"></div>
        <div class="two-col">
          <div>
            <label>Restaurant Name</label>
            <input type="text" id="restaurant" placeholder="e.g. Pizza Palace" />
          </div>
          <div>
            <label>Delivery Address</label>
            <input type="text" id="address" placeholder="e.g. 42 Main St, Colombo" />
          </div>
        </div>
        <label style="margin-top:18px;">Order Items</label>
        <div id="items-container">
          <div class="item-row">
            <div><label>Item Name</label><input type="text" placeholder="e.g. Chicken Burger" class="item-name" /></div>
            <div><label>Qty</label><input type="number" min="1" value="1" class="item-qty" /></div>
            <div><label>Price ($)</label><input type="number" min="0" step="0.01" placeholder="5.99" class="item-price" /></div>
            <div style="margin-top:20px;"><button class="remove-btn" onclick="removeItem(this)">✕</button></div>
          </div>
        </div>
        <button class="add-item-btn" onclick="addItem()">+ Add another item</button>
        <label style="margin-top:16px;">Notes (optional)</label>
        <textarea id="notes" rows="2" placeholder="e.g. No onions, extra sauce"></textarea>
        <button class="btn" onclick="placeOrder()">Place Order</button>
      </div>
    </div>

    <!-- NOTIFICATIONS TAB -->
    <div id="tab-notifications" class="hidden">
      <div class="flex-between" style="margin-bottom:16px;">
        <h2 style="font-size:18px;font-weight:600;">Notifications</h2>
        <button class="btn btn-small" onclick="loadNotifications()">Refresh</button>
      </div>
      <div id="notifications-list"><p style="color:#888;text-align:center;padding:40px 0;">Loading notifications...</p></div>
    </div>
  </div>
</div>

<script>
  // All requests go through the Nginx gateway on the same origin.
  // No hardcoded ports — gateway routes to the correct service internally.
  const API = {
    auth: '',
    orders: '',
    notifications: ''
  };

  let token = localStorage.getItem('token');
  let user = JSON.parse(localStorage.getItem('user') || 'null');

  if (token && user) showApp();

  function showApp() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('app-section').classList.remove('hidden');
    document.getElementById('nav-user').textContent = `${user.name} (${user.role})`;
    document.getElementById('logout-btn').classList.remove('hidden');
    loadOrders();
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    token = null; user = null;
    document.getElementById('auth-section').classList.remove('hidden');
    document.getElementById('app-section').classList.add('hidden');
    document.getElementById('logout-btn').classList.add('hidden');
    document.getElementById('nav-user').textContent = '';
  }

  function showRegister() {
    document.getElementById('login-card').classList.add('hidden');
    document.getElementById('register-card').classList.remove('hidden');
  }

  function showLogin() {
    document.getElementById('register-card').classList.add('hidden');
    document.getElementById('login-card').classList.remove('hidden');
  }

  function alert(containerId, message, type='info') {
    document.getElementById(containerId).innerHTML =
      `<div class="alert alert-${type}">${message}</div>`;
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    try {
      const res = await fetch(`${API.auth}/api/auth/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) return alert('login-alert', data.message, 'error');
      token = data.token; user = data.user;
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(user));
      showApp();
    } catch (e) {
      alert('login-alert', 'Cannot connect to auth service. Is it running?', 'error');
    }
  }

  async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const role = document.getElementById('reg-role').value;
    try {
      const res = await fetch(`${API.auth}/api/auth/register`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, email, password, role })
      });
      const data = await res.json();
      if (!res.ok) return alert('register-alert', data.message, 'error');
      token = data.token; user = data.user;
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(user));
      showApp();
    } catch (e) {
      alert('register-alert', 'Cannot connect to auth service. Is it running?', 'error');
    }
  }

  function showTab(name) {
    ['orders','place','notifications'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.add('hidden');
    });
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.remove('hidden');
    event.target.classList.add('active');
    if (name === 'orders') loadOrders();
    if (name === 'notifications') loadNotifications();
  }

  async function loadOrders() {
    const container = document.getElementById('orders-list');
    try {
      const res = await fetch(`${API.orders}/api/orders`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) { container.innerHTML = `<p style="color:red;">${data.message}</p>`; return; }
      const orders = data.orders;
      if (!orders.length) { container.innerHTML = '<p style="color:#888;text-align:center;padding:40px 0;">No orders yet. Place your first order!</p>'; return; }
      container.innerHTML = orders.map(o => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div style="font-weight:600;font-size:15px;">${o.restaurantName}</div>
              <div class="order-id">#${o._id}</div>
            </div>
            <span class="status-badge status-${o.status}">${o.status.replace(/_/g,' ')}</span>
          </div>
          <div class="items-list">${o.items.map(i => `${i.name} x${i.quantity}`).join(' · ')}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
            <span class="meta">${new Date(o.createdAt).toLocaleString()}</span>
            <span class="total">$${o.totalAmount.toFixed(2)}</span>
          </div>
          ${o.status === 'pending' ? `<button class="btn btn-small" style="margin-top:12px;background:#dc3545;" onclick="cancelOrder('${o._id}')">Cancel Order</button>` : ''}
          ${user.role === 'admin' ? `
            <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
              ${['confirmed','preparing','out_for_delivery','delivered'].map(s =>
                `<button class="btn btn-small btn-secondary" onclick="updateStatus('${o._id}','${s}')">${s.replace(/_/g,' ')}</button>`
              ).join('')}
            </div>` : ''}
        </div>`).join('');
    } catch (e) {
      container.innerHTML = '<p style="color:red;">Cannot reach order service.</p>';
    }
  }

  async function cancelOrder(id) {
    if (!confirm('Cancel this order?')) return;
    const res = await fetch(`${API.orders}/api/orders/${id}`, {
      method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) loadOrders();
  }

  async function updateStatus(id, status) {
    const res = await fetch(`${API.orders}/api/orders/${id}/status`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    if (res.ok) loadOrders();
  }

  function addItem() {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <div><label>Item Name</label><input type="text" placeholder="e.g. Fries" class="item-name" /></div>
      <div><label>Qty</label><input type="number" min="1" value="1" class="item-qty" /></div>
      <div><label>Price ($)</label><input type="number" min="0" step="0.01" placeholder="3.99" class="item-price" /></div>
      <div style="margin-top:20px;"><button class="remove-btn" onclick="removeItem(this)">✕</button></div>`;
    document.getElementById('items-container').appendChild(row);
  }

  function removeItem(btn) {
    const rows = document.querySelectorAll('#items-container .item-row');
    if (rows.length === 1) return;
    btn.closest('.item-row').remove();
  }

  async function placeOrder() {
    const restaurant = document.getElementById('restaurant').value.trim();
    const address = document.getElementById('address').value.trim();
    const notes = document.getElementById('notes').value.trim();

    const itemRows = document.querySelectorAll('#items-container .item-row');
    const items = [];
    for (const row of itemRows) {
      const name = row.querySelector('.item-name').value.trim();
      const quantity = parseInt(row.querySelector('.item-qty').value);
      const price = parseFloat(row.querySelector('.item-price').value);
      if (!name || !price) { alert('place-alert', 'Fill in all item details.', 'error'); return; }
      items.push({ name, quantity, price });
    }

    if (!restaurant || !address || !items.length) {
      return alert('place-alert', 'Please fill all required fields.', 'error');
    }

    try {
      const res = await fetch(`${API.orders}/api/orders`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ restaurantName: restaurant, deliveryAddress: address, items, notes })
      });
      const data = await res.json();
      if (!res.ok) return alert('place-alert', data.message, 'error');
      alert('place-alert', `Order placed! Total: $${data.order.totalAmount.toFixed(2)}. A notification has been sent.`, 'success');
      document.getElementById('restaurant').value = '';
      document.getElementById('address').value = '';
      document.getElementById('notes').value = '';
      document.getElementById('items-container').innerHTML = `
        <div class="item-row">
          <div><label>Item Name</label><input type="text" placeholder="e.g. Chicken Burger" class="item-name" /></div>
          <div><label>Qty</label><input type="number" min="1" value="1" class="item-qty" /></div>
          <div><label>Price ($)</label><input type="number" min="0" step="0.01" placeholder="5.99" class="item-price" /></div>
          <div style="margin-top:20px;"><button class="remove-btn" onclick="removeItem(this)">✕</button></div>
        </div>`;
    } catch (e) {
      alert('place-alert', 'Cannot reach order service.', 'error');
    }
  }

  async function loadNotifications() {
    const container = document.getElementById('notifications-list');
    try {
      const url = user.role === 'admin'
        ? `${API.notifications}/api/notifications`
        : `${API.notifications}/api/notifications`;
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const notifs = data.notifications;
      if (!notifs.length) { container.innerHTML = '<p style="color:#888;text-align:center;padding:40px 0;">No notifications yet.</p>'; return; }
      container.innerHTML = notifs.map(n => `
        <div class="notif-card">
          <div class="notif-type">${n.eventType.replace(/_/g,' ')}</div>
          <div class="notif-msg">${n.message}</div>
          <div class="notif-time">${new Date(n.createdAt).toLocaleString()} · ${n.customerEmail}</div>
        </div>`).join('');
    } catch (e) {
      container.innerHTML = '<p style="color:red;">Cannot reach notification service.</p>';
    }
  }
</script>
</body>
</html>
